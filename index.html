    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root { 
            --color-forest: #064e3b; 
            --color-earth: #9a3412;  
            --color-sand: #faf6f0;   
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--color-sand);
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        h1, h2, h3, h4, .heading { 
            font-family: 'Space Grotesk', sans-serif; 
            letter-spacing: -0.03em; 
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(6, 78, 59, 0.05);
        }

        .card-premium {
            background: #ffffff;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .card-premium:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 25px 50px -12px rgba(6, 78, 59, 0.12); 
        }

        .glow-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .glow-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s ease;
        }
        .glow-btn:hover::after { left: 150%; }
        .glow-shadow { box-shadow: 0 0 20px rgba(6, 78, 59, 0.3); }

        .accordion-content { 
            transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; 
            max-height: 0;
            opacity: 0;
            overflow: hidden; 
        }
        .accordion-content.open { opacity: 1; }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .reveal-zoom {
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-zoom.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }
        .delay-400 { transition-delay: 400ms; }
        
        .progress-bar-fill {
            width: 0;
            transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active .progress-bar-fill { width: var(--target-width); }

        /* LOGO FIX */
        svg.logo-svg { 
            filter: drop-shadow(0 4px 12px rgba(6, 78, 59, 0.3)); 
            height: 48px !important;
            width: auto !important;
        }
        .path {
            stroke: #064e3b;
            stroke-width: 2.4;
            stroke-linejoin: round;
            stroke-linecap: round;
            fill: transparent;
            stroke-dasharray: 0;
            stroke-dashoffset: 0;
            animation: draw 4s ease forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>

    <script>
        function toggleAcc(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.fa-chevron-down, .fa-plus');
            const isOpen = content.classList.contains('open');
            if (!isOpen) {
                content.classList.add('open');
                content.style.maxHeight = content.scrollHeight + 'px';
                if(icon.classList.contains('fa-chevron-down')) icon.style.transform = 'rotate(180deg)';
                if(icon.classList.contains('fa-plus')) icon.style.transform = 'rotate(45deg)';
            } else {
                content.classList.remove('open');
                content.style.maxHeight = null;
                icon.style.transform = 'rotate(0deg)';
            }
        }

        const prinzipienData = [ /* dein komplettes Array unverändert */ ];

        let logoPaths = [];

        function animateLogo() {
            logoPaths = document.querySelectorAll('.path');
            logoPaths.forEach((path, i) => {
                const length = path.getTotalLength();
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                path.style.animationDelay = `${i * 60}ms`;
                void path.offsetWidth;
                path.style.animation = 'draw 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards';
            });
            setTimeout(() => {
                logoPaths.forEach(path => {
                    path.style.fill = '#064e3b';
                    path.style.transition = 'fill 0.9s ease';
                });
            }, 2400);
        }

        function resetLogo() {
            logoPaths.forEach(path => {
                const length = path.getTotalLength();
                path.style.fill = 'transparent';
                path.style.strokeDashoffset = length;
                void path.offsetWidth;
                path.style.animation = 'draw 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards';
            });
            setTimeout(() => {
                logoPaths.forEach(path => path.style.fill = '#064e3b');
            }, 2400);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal, .reveal-zoom').forEach(el => observer.observe(el));

            animateLogo();

            window.addEventListener('scroll', () => {
                if (window.pageYOffset < 80) resetLogo();
            });
        });
    </script>
